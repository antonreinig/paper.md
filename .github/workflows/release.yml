name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Editor/package-lock.json

      - name: Install build tools
        run: brew install xcodegen

      - name: Build editor and project
        run: ./scripts/bootstrap.sh

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive signed app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project MarkdownViewer.xcodeproj \
            -scheme MarkdownViewer \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/MarkdownViewer.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--timestamp"
          codesign --verify --deep --strict --verbose=2 "$RUNNER_TEMP/MarkdownViewer.xcarchive/Products/Applications/MarkdownViewer.app"

      - name: Create disk image
        run: |
          mkdir -p "$RUNNER_TEMP/dmg"
          ditto "$RUNNER_TEMP/MarkdownViewer.xcarchive/Products/Applications/MarkdownViewer.app" "$RUNNER_TEMP/dmg/Markdown Viewer.app"
          ln -s /Applications "$RUNNER_TEMP/dmg/Applications"
          hdiutil create -volname "Markdown Viewer" -srcfolder "$RUNNER_TEMP/dmg" -ov -format UDZO "$RUNNER_TEMP/MarkdownViewer.dmg"
          codesign --force --timestamp --sign "Developer ID Application" "$RUNNER_TEMP/MarkdownViewer.dmg"

      - name: Notarize and staple
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_$API_KEY_ID.p8"
          echo "$API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          xcrun notarytool submit "$RUNNER_TEMP/MarkdownViewer.dmg" --key "$API_KEY_PATH" --key-id "$API_KEY_ID" --issuer "$API_ISSUER_ID" --wait
          xcrun stapler staple "$RUNNER_TEMP/MarkdownViewer.dmg"
          xcrun stapler validate "$RUNNER_TEMP/MarkdownViewer.dmg"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "v$VERSION" "$RUNNER_TEMP/MarkdownViewer.dmg#Markdown Viewer $VERSION" --title "Markdown Viewer $VERSION" --generate-notes --target "$GITHUB_SHA"

