name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Editor/package-lock.json

      - name: Install build tools
        run: |
          brew install xcodegen
          curl -fsSL https://github.com/sparkle-project/Sparkle/releases/download/2.9.4/Sparkle-2.9.4.tar.xz \
            | tar -xJ -C "$RUNNER_TEMP"

      - name: Build editor and project
        run: ./scripts/bootstrap.sh

      - name: Validate release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PROJECT_VERSION=$(sed -n 's/^[[:space:]]*MARKETING_VERSION: //p' project.yml)
          if [ "$PROJECT_VERSION" != "$VERSION" ]; then
            echo "Release version $VERSION does not match MARKETING_VERSION $PROJECT_VERSION" >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive signed app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project PaperMD.xcodeproj \
            -scheme PaperMD \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/PaperMD.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--timestamp"
          codesign --verify --deep --strict --verbose=2 "$RUNNER_TEMP/PaperMD.xcarchive/Products/Applications/PaperMD.app"

      - name: Create disk image
        run: |
          mkdir -p "$RUNNER_TEMP/dmg"
          ditto "$RUNNER_TEMP/PaperMD.xcarchive/Products/Applications/PaperMD.app" "$RUNNER_TEMP/dmg/paper.md.app"
          ln -s /Applications "$RUNNER_TEMP/dmg/Applications"
          hdiutil create -volname "paper.md" -srcfolder "$RUNNER_TEMP/dmg" -ov -format UDZO "$RUNNER_TEMP/paper.md.dmg"
          codesign --force --timestamp --sign "Developer ID Application" "$RUNNER_TEMP/paper.md.dmg"

      - name: Notarize and staple
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_$API_KEY_ID.p8"
          echo "$API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          NOTARY_RESULT=$(xcrun notarytool submit "$RUNNER_TEMP/paper.md.dmg" --key "$API_KEY_PATH" --key-id "$API_KEY_ID" --issuer "$API_ISSUER_ID" --wait --output-format json)
          echo "$NOTARY_RESULT"
          SUBMISSION_ID=$(jq -r '.id' <<<"$NOTARY_RESULT")
          NOTARY_STATUS=$(jq -r '.status' <<<"$NOTARY_RESULT")
          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            xcrun notarytool log "$SUBMISSION_ID" --key "$API_KEY_PATH" --key-id "$API_KEY_ID" --issuer "$API_ISSUER_ID"
            exit 1
          fi
          xcrun stapler staple "$RUNNER_TEMP/paper.md.dmg"
          xcrun stapler validate "$RUNNER_TEMP/paper.md.dmg"

      - name: Generate signed update feed
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p "$RUNNER_TEMP/updates"
          cp "$RUNNER_TEMP/paper.md.dmg" "$RUNNER_TEMP/updates/paper.md-$VERSION.dmg"
          echo "$SPARKLE_PRIVATE_KEY" | "$RUNNER_TEMP/bin/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/antonreinig/paper.md/releases/download/v$VERSION/" \
            --full-release-notes-url "https://github.com/antonreinig/paper.md/releases/tag/v$VERSION" \
            --link "https://github.com/antonreinig/paper.md" \
            --maximum-versions 1 \
            --maximum-deltas 0 \
            "$RUNNER_TEMP/updates"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$VERSION" \
            "$RUNNER_TEMP/updates/paper.md-$VERSION.dmg#paper.md $VERSION" \
            "$RUNNER_TEMP/updates/appcast.xml" \
            --title "paper.md $VERSION" \
            --generate-notes \
            --target "$GITHUB_SHA"
