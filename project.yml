name: PaperMD
options:
  bundleIdPrefix: com.antonreinig
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 8DTMQ4N2LA
    CURRENT_PROJECT_VERSION: 5
    MARKETING_VERSION: 0.2.0
    DEAD_CODE_STRIPPING: YES
packages:
  Markdown:
    url: https://github.com/swiftlang/swift-markdown.git
    from: 0.8.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    exactVersion: 2.9.4
targets:
  PaperMD:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - Resources
      - path: Shared/MarkdownFileReader.swift
      - path: BundledEditor/index.html
        buildPhase: resources
      - path: BundledEditor/assets
        type: folder
        buildPhase: resources
      - path: ThirdPartyNotices/Sparkle.txt
        buildPhase: resources
    dependencies:
      - target: PaperMDQuickLook
        embed: true
      - target: PaperMDThumbnail
        embed: true
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antonreinig.PaperMD
        PRODUCT_MODULE_NAME: PaperMD
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/PaperMD.entitlements
        ENABLE_APP_SANDBOX: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      testTargets:
        - PaperMDTests
      gatherCoverageData: true
  PaperMDQuickLook:
    type: app-extension
    platform: macOS
    sources:
      - QuickLook
      - path: Shared/MarkdownFileReader.swift
    dependencies:
      - package: Markdown
        product: Markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antonreinig.PaperMD.QuickLook
        PRODUCT_MODULE_NAME: PaperMDQuickLook
        INFOPLIST_FILE: QuickLook/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickLook/QuickLook.entitlements
        SKIP_INSTALL: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
  PaperMDThumbnail:
    type: app-extension
    platform: macOS
    sources:
      - QuickLookThumbnail
      - path: Shared/MarkdownFileReader.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antonreinig.PaperMD.Thumbnail
        PRODUCT_MODULE_NAME: PaperMDThumbnail
        INFOPLIST_FILE: QuickLookThumbnail/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickLookThumbnail/QuickLookThumbnail.entitlements
        SKIP_INSTALL: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
  PaperMDTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/PaperMDTests
    dependencies:
      - target: PaperMD
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antonreinig.PaperMDTests
        PRODUCT_MODULE_NAME: PaperMDTests
        GENERATE_INFOPLIST_FILE: YES
